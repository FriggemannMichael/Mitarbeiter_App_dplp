name: Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/friggemannmichael/mitarbeiterapp

jobs:
  build-backend:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend-django
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-frontend:
    name: Deploy Frontend via FTP
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          VITE_FORCE_API: true
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Deploy dist/ via FTP
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "
          set ftp:passive-mode yes;
          set ssl:verify-certificate no;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
          mirror --reverse --delete --verbose dist/ ${{ secrets.FTP_SERVER_DIR }};
          bye
          "
